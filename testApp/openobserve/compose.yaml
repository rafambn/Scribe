services:
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: scribe-openobserve
    restart: unless-stopped
    ports:
      - "5080:5080"
    env_file:
      - .env
    environment:
      ZO_DATA_DIR: /data
      ZO_INGEST_FLATTEN_LEVEL: "0"
    volumes:
      - ./data:/data
