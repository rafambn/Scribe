site_name: Scribe
site_description: Kotlin Multiplatform logging with lore-driven primitives
site_url: https://scribe.rafambn.com
repo_url: https://github.com/rafambn/Scribe
repo_name: rafambn/Scribe
edit_uri: edit/main/docs/

theme:
  name: material
  logo: scribe-logo.svg
  favicon: scribe-logo.svg
  language: en
  features:
    - navigation.instant
    - navigation.top
    - navigation.sections
    - navigation.footer
    - toc.follow
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: black
      accent: deep orange

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Concepts: api-concepts.md
  - Lifecycle and Delivery: lifecycle-and-delivery.md
  - OpenObserve Showcase: openobserve-showcase.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details

extra_css:
  - stylesheets/extra.css
